<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Never Bored Engine v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: ui-sans-serif, system-ui, sans-serif; overflow-x: hidden; }
        .glass { background: #111; border: 1px solid #222; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .img-box { height: 320px; background: #1a1a1a; position: relative; overflow: hidden; }
        #topicImg { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.6s ease-in-out; }
        .btn-main { background: white; color: black; font-weight: 900; transition: all 0.2s; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        .btn-main:active { transform: translateY(0) scale(0.98); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 selection:bg-white selection:text-black">

    <div class="w-full max-w-xl py-10 flex flex-col gap-10">
        <button onclick="nextTopic()" class="btn-main w-full py-7 rounded-full text-2xl uppercase tracking-tighter sticky top-4 z-50">
            I'M BORED
        </button>

        <div id="card" class="glass hidden fade-in">
            <div class="img-box">
                <img id="topicImg" src="" class="opacity-0">
                <div id="imgPlaceholder" class="absolute inset-0 flex items-center justify-center text-white/5 font-black text-4xl italic uppercase">Researching...</div>
            </div>
            
            <div class="p-8 space-y-8">
                <div>
                    <h2 id="titleEn" class="text-3xl font-black text-white tracking-tight leading-none"></h2>
                    <p id="descEn" class="mt-5 text-gray-400 text-lg leading-relaxed font-medium"></p>
                </div>

                <div class="h-[1px] bg-white/5"></div>

                <div>
                    <h2 id="titleCn" class="text-2xl font-bold text-white/80 tracking-wide"></h2>
                    <p id="descCn" class="mt-4 text-gray-500 text-lg leading-relaxed"></p>
                </div>

                <div class="flex gap-4 pt-6">
                    <button onclick="handleLike()" class="flex-1 py-5 rounded-2xl bg-emerald-500/10 text-emerald-400 font-black border border-emerald-500/20 hover:bg-emerald-500/20 transition-all uppercase text-xs tracking-widest">LIKE</button>
                    <button onclick="nextTopic()" class="flex-1 py-5 rounded-2xl bg-rose-500/10 text-rose-400 font-black border border-rose-500/20 hover:bg-rose-500/20 transition-all uppercase text-xs tracking-widest">DISLIKE</button>
                </div>
                
                <a id="googleBtn" target="_blank" class="block text-center py-2 text-[10px] text-white/20 hover:text-white/60 uppercase tracking-[0.3em] font-bold transition-colors">
                    Search on Google
                </a>
            </div>
        </div>
    </div>

    <div id="status" class="fixed bottom-8 right-8 flex items-center gap-3 px-5 py-2.5 bg-black/50 border border-white/5 rounded-full backdrop-blur-xl">
        <div id="dot" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
        <span id="statText" class="text-[10px] font-black uppercase tracking-widest text-white/50">Engine Online</span>
    </div>

    <script>
        const API_KEY = "AIzaSyB__Frm84zPTGW1xH9h15E6mTifew99esw";
        
        let db = [
            { id: 1, en: "Tardigrades", cn: "水熊虫", descEn: "Microscopic animals that survive in the vacuum of space, extreme pressure, and radiation.", descCn: "被称为“水熊虫”的微观动物，可以在外太空、极端压力和辐射中生存。" },
            { id: 2, en: "Voynich Manuscript", cn: "伏尼契手稿", descEn: "A mysterious 15th-century book written in an unknown code that has never been broken.", descCn: "一本用未知代码编写的神秘15世纪书籍，至今尚未被破译。" },
            { id: 3, en: "Kardashev Scale", cn: "卡尔达舍夫等级", descEn: "A method of measuring a civilization's level of technological advancement based on energy usage.", descCn: "一种根据文明使用的能量消耗量来衡量其技术先进程度的方法。" }
        ];

        let seen = JSON.parse(localStorage.getItem('bored_engine_v14') || '[]');
        let current = null;

        function updateStat(msg, color) {
            document.getElementById('statText').innerText = msg;
            document.getElementById('dot').style.backgroundColor = color;
            document.getElementById('dot').style.boxShadow = `0 0 10px ${color}`;
        }

        async function fetchImage(query) {
            try {
                // Wikipedia API with origin=* is the key for local file CORS bypass
                const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages&titles=${encodeURIComponent(query)}&pithumbsize=1000&origin=*`;
                const res = await fetch(searchUrl);
                const data = await res.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                if (pageId !== "-1" && pages[pageId].thumbnail) {
                    return pages[pageId].thumbnail.source;
                }
                return `https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1000&q=80`;
            } catch {
                return `https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1000&q=80`;
            }
        }

        async function nextTopic() {
            document.getElementById('card').classList.remove('hidden');
            const pool = db.filter(t => !seen.includes(t.id));
            current = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : db[Math.floor(Math.random() * db.length)];
            
            document.getElementById('titleEn').innerText = current.en;
            document.getElementById('titleCn').innerText = current.cn;
            document.getElementById('descEn').innerText = current.descEn;
            document.getElementById('descCn').innerText = current.descCn;
            document.getElementById('googleBtn').href = `https://www.google.com/search?q=${encodeURIComponent(current.en)}`;

            const img = document.getElementById('topicImg');
            img.style.opacity = '0';
            const freshImg = await fetchImage(current.en);
            img.src = freshImg;
            img.onload = () => img.style.opacity = '1';
        }

        async function handleLike() {
            seen.push(current.id);
            localStorage.setItem('bored_engine_v14', JSON.stringify(seen));
            
            updateStat("Researching...", "#fbbf24");
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `User liked ${current.en}. Generate 3 niche, weird related topics. JSON format ONLY: [{"id":${Date.now()},"en":"..","cn":"..","descEn":"..","descCn":".."}]` }] }]
                    })
                });

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\[.*\]/s);
                if (jsonMatch) {
                    const newItems = JSON.parse(jsonMatch[0]);
                    db = [...db, ...newItems];
                    updateStat("Engine Expanded", "#10b981");
                }
            } catch (err) {
                updateStat("API Error", "#f43f5e");
            }
            nextTopic();
        }

        window.onload = nextTopic;
    </script>
</body>
</html>
